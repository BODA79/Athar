<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحجز</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .panel {
      max-width: 620px;
      margin: 40px auto;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 20px rgba(40, 174, 138, 0.08);
    }
    .field { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; color: var(--primary); font-weight: 700; }
    .status { margin-top: 12px; color: var(--primary); font-weight: 700; }
  </style>
</head>
<body>
  <nav class="nav"><div class="nav">
        <div class="logo"></div>
           <Img src="img/athar-go.jpg" style="height: 45 !important; width: auto !important; ;" alt="logo ">
  </div>
      <ul class="nav-links"></ul>
    </div>
  </nav>

  <main class="container">
    <section class="panel">
      <h1>نموذج الحجز</h1>
      <p class="lead">اكتب بياناتك وسنقوم بالتواصل معك.</p>
      <form id="bookingForm">
        <div class="field">
          <label for="name">الاسم</label>
          <input class="input" id="name" type="text" required>
        </div>
        <div class="field">
          <label for="phone">رقم الهاتف</label>
          <input class="input" id="phone" type="tel" required maxlength="11" minlength="11">
        </div>
        <div class="field">
          <label for="email">البريد الإلكتروني</label>
          <input class="input" id="email" type="email" required>
        </div>
        <button class="btn" type="submit">إرسال</button>
      </form>
      <div id="status" class="status"></div>
    </section>
  </main>

  <script type="module">
    import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD0z1ocI7KpWoGChJwsouf1o9y6zrJk8UE",
        authDomain: "athar-e0f22.firebaseapp.com",
        projectId: "athar-e0f22",
        storageBucket: "athar-e0f22.firebasestorage.app",
        messagingSenderId: "1034869242246",
        appId: "1:1034869242246:web:f8ab150ab42223706f9407",
        measurementId: "G-7BYGV072KQ"
    };

    const app = getApps().length ? getApp() : initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('bookingForm');
    const statusEl = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'جارٍ إرسال الحجز...';

      const bookingData = {
        name: document.getElementById('name').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        email: document.getElementById('email').value.trim(),
        timestamp: serverTimestamp(),
        createdAt: new Date().toISOString()
      };

      try {
        const docRef = await addDoc(collection(db, 'bookings'), bookingData);
        statusEl.textContent = `تم إرسال الحجز بنجاح. رقم الطلب: ${docRef.id}`;
        form.reset();
      } catch (error) {
        console.error('Booking Firebase Error:', error);
        statusEl.textContent = `فشل الإرسال: ${error.message || 'تحقق من اتصال الإنترنت أو إعدادات Firebase'}`;
      }
    });
  </script>
  <script src="script/script.js"></script>
</body>
</html>
